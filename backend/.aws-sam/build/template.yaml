AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TGV Mitglieder Backend
Parameters:
  UserPoolId:
    Type: String
    Default: eu-central-1_vJEWudU5g
  CognitoDomain:
    Type: String
    Default: benutzer.tgveintrachtbeilstein.de
  ProdDomain:
    Type: String
    Default: https://mitglied.tgveintrachtbeilstein.de
  LocalPort:
    Type: String
    Default: '3003'
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME:
          Ref: FormsTable
        BUCKET_NAME:
          Ref: FormsBucket
Resources:
  FormsBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
        - AllowedHeaders:
          - '*'
          AllowedMethods:
          - GET
          - PUT
          AllowedOrigins:
          - Ref: ProdDomain
          - Fn::Sub: http://localhost:${LocalPort}
          MaxAge: 3600
  FormsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: PK
        AttributeType: S
      - AttributeName: SK
        AttributeType: S
      KeySchema:
      - AttributeName: PK
        KeyType: HASH
      - AttributeName: SK
        KeyType: RANGE
  LocalhostClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId:
        Ref: UserPoolId
      ClientName: tgv-localhost
      GenerateSecret: false
      AllowedOAuthFlows:
      - code
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
      - openid
      - email
      - profile
      SupportedIdentityProviders:
      - COGNITO
      CallbackURLs:
      - Fn::Sub: http://localhost:${LocalPort}/callback
      LogoutURLs:
      - Fn::Sub: http://localhost:${LocalPort}
      ExplicitAuthFlows:
      - ALLOW_REFRESH_TOKEN_AUTH
  ProductionClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId:
        Ref: UserPoolId
      ClientName: tgv-production
      GenerateSecret: false
      AllowedOAuthFlows:
      - code
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
      - openid
      - email
      - profile
      SupportedIdentityProviders:
      - COGNITO
      CallbackURLs:
      - Fn::Sub: ${ProdDomain}/callback
      LogoutURLs:
      - Ref: ProdDomain
      ExplicitAuthFlows:
      - ALLOW_REFRESH_TOKEN_AUTH
  LocalhostBranding:
    Type: AWS::Cognito::ManagedLoginBranding
    Properties:
      UserPoolId:
        Ref: UserPoolId
      ClientId:
        Ref: LocalhostClient
      UseCognitoProvidedValues: true
  ProductionBranding:
    Type: AWS::Cognito::ManagedLoginBranding
    Properties:
      UserPoolId:
        Ref: UserPoolId
      ClientId:
        Ref: ProductionClient
      UseCognitoProvidedValues: true
  TgvInboxAccessGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: tgv-inbox-access
      Description: Zentraler Zugriff auf das Nachrichtensystem
      UserPoolId:
        Ref: UserPoolId
  GeschaeftsstelleGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: tgv-geschaeftsstelle
      Description: "Gesch\xE4ftsstelle mit Zugriff auf alle Einreichungen"
      UserPoolId:
        Ref: UserPoolId
  VorstandGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: tgv-vorstand
      Description: Vollzugriff
      UserPoolId:
        Ref: UserPoolId
  ErweiterterVorstandGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: tgv-erweiterter-vorstand
      Description: Erw. Vorstand
      UserPoolId:
        Ref: UserPoolId
  JugendvorstandGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: tgv-jugendvorstand
      Description: Jugendvorstand
      UserPoolId:
        Ref: UserPoolId
  HauptausschussGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: tgv-hauptausschuss
      Description: Hauptausschuss
      UserPoolId:
        Ref: UserPoolId
  AbteilungsleiterGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: tgv-abteilungsleiter
      Description: Abteilungsleiter
      UserPoolId:
        Ref: UserPoolId
  KassenpruferGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: tgv-kassenprufer
      Description: "Kassenpr\xFCfer"
      UserPoolId:
        Ref: UserPoolId
  AbtFussballGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: tgv-abt-fussball
      Description: "Fu\xDFball"
      UserPoolId:
        Ref: UserPoolId
  AbtHandballGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: tgv-abt-handball
      Description: Handball
      UserPoolId:
        Ref: UserPoolId
  AbtTurnenGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: tgv-abt-turnen
      Description: Turnen
      UserPoolId:
        Ref: UserPoolId
  AbtTennisGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: tgv-abt-tennis
      Description: Tennis
      UserPoolId:
        Ref: UserPoolId
  AbtSchwimmenGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: tgv-abt-schwimmen
      Description: Schwimmen
      UserPoolId:
        Ref: UserPoolId
  AbtSkiUndBergGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: tgv-abt-ski-und-berg
      Description: Ski und Berg
      UserPoolId:
        Ref: UserPoolId
  AbtGymnastikGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: tgv-abt-gymnastik
      Description: Gymnastik
      UserPoolId:
        Ref: UserPoolId
  AbtTischtennisGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: tgv-abt-tischtennis
      Description: Tischtennis
      UserPoolId:
        Ref: UserPoolId
  AbtGesangGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: tgv-abt-gesang
      Description: Gesang
      UserPoolId:
        Ref: UserPoolId
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
        - Ref: ProdDomain
        - Fn::Sub: http://localhost:${LocalPort}
        AllowHeaders:
        - Authorization
        - Content-Type
        AllowMethods:
        - GET
        - POST
        - DELETE
        - OPTIONS
        AllowCredentials: true
      Auth:
        DefaultAuthorizer: CognitoJwt
        Authorizers:
          CognitoJwt:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer:
                Fn::Sub: https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPoolId}
              audience:
              - Ref: LocalhostClient
              - Ref: ProductionClient
  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Properties:
      DomainName: api.tgveintrachtbeilstein.de
      ApiId:
        Ref: HttpApi
      Stage: $default
      ApiMappingKey: mitglieder
  GetUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get-upload-url.handler
      CodeUri: GetUploadUrlFunction
      Policies:
      - Statement:
        - Effect: Allow
          Action: s3:PutObject
          Resource:
            Fn::Sub: ${FormsBucket.Arn}/users/*
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /upload-url
            Method: GET
    Metadata:
      SamResourceId: GetUploadUrlFunction
  ListFilesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: list-files.handler
      CodeUri: ListFilesFunction
      Policies:
      - Statement:
        - Effect: Allow
          Action: s3:ListBucket
          Resource:
            Fn::GetAtt:
            - FormsBucket
            - Arn
          Condition:
            StringLike:
              s3:prefix: users/*
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /files
            Method: GET
    Metadata:
      SamResourceId: ListFilesFunction
  GetFileFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get-file.handler
      CodeUri: GetFileFunction
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - s3:GetObject
          - s3:GetBucketLocation
          Resource:
          - Fn::Sub: ${FormsBucket.Arn}/*
        - Effect: Allow
          Action: s3:ListBucket
          Resource:
            Fn::GetAtt:
            - FormsBucket
            - Arn
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /file
            Method: GET
    Metadata:
      SamResourceId: GetFileFunction
  DeleteFileFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: delete-file.handler
      CodeUri: DeleteFileFunction
      Policies:
      - Statement:
        - Effect: Allow
          Action: s3:DeleteObject
          Resource:
            Fn::Sub: ${FormsBucket.Arn}/users/*
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /file
            Method: DELETE
    Metadata:
      SamResourceId: DeleteFileFunction
  SubmitFormFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: submit-form.handler
      CodeUri: SubmitFormFunction
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FormsTable
      - Statement:
        - Effect: Allow
          Action: events:PutEvents
          Resource:
            Fn::Sub: arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/default
        - Effect: Allow
          Action: s3:PutObject
          Resource:
            Fn::Sub: ${FormsBucket.Arn}/users/*/.data/*
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /submit
            Method: POST
    Metadata:
      SamResourceId: SubmitFormFunction
  ListSubmissionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: list-submissions.handler
      CodeUri: ListSubmissionsFunction
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: FormsTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /submissions
            Method: GET
    Metadata:
      SamResourceId: ListSubmissionsFunction
  SendMessageFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: send-message.handler
      CodeUri: SendMessageFunction
      Environment:
        Variables:
          USER_POOL_ID:
            Ref: UserPoolId
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FormsTable
      - Statement:
        - Effect: Allow
          Action: events:PutEvents
          Resource:
            Fn::Sub: arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/default
        - Effect: Allow
          Action: cognito-idp:ListUsersInGroup
          Resource:
            Fn::Sub: arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${UserPoolId}
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /messages
            Method: POST
    Metadata:
      SamResourceId: SendMessageFunction
  ListMessagesFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: list-messages.handler
      CodeUri: ListMessagesFunction
      Policies:
      - DynamoDBReadPolicy:
          TableName:
            Ref: FormsTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /messages
            Method: GET
    Metadata:
      SamResourceId: ListMessagesFunction
  ProcessMessageFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: process-message.handler
      CodeUri: ProcessMessageFunction
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FormsTable
      Events:
        MessageSent:
          Type: EventBridgeRule
          Properties:
            Pattern:
              Source:
              - tgv.mitglieder
              detail-type:
              - message.sent
    Metadata:
      SamResourceId: ProcessMessageFunction
  ListDirectoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: list-directory.handler
      CodeUri: ListDirectoryFunction
      Environment:
        Variables:
          USER_POOL_ID:
            Ref: UserPoolId
      Policies:
      - Statement:
        - Effect: Allow
          Action:
          - cognito-idp:ListUsers
          - cognito-idp:ListGroups
          Resource:
            Fn::Sub: arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${UserPoolId}
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /directory
            Method: GET
    Metadata:
      SamResourceId: ListDirectoryFunction
  SyncSaveFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: sync-save.handler
      CodeUri: SyncSaveFunction
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FormsTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /sync
            Method: POST
    Metadata:
      SamResourceId: SyncSaveFunction
  SyncLoadFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: sync-load.handler
      CodeUri: SyncLoadFunction
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: FormsTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /sync
            Method: GET
    Metadata:
      SamResourceId: SyncLoadFunction
  ConfigFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: config.handler
      CodeUri: ConfigFunction
      Environment:
        Variables:
          COGNITO_DOMAIN:
            Fn::Sub: https://${CognitoDomain}
          LOCALHOST_CLIENT_ID:
            Ref: LocalhostClient
          PRODUCTION_CLIENT_ID:
            Ref: ProductionClient
          PROD_DOMAIN:
            Ref: ProdDomain
          LOCAL_PORT:
            Ref: LocalPort
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /config
            Method: GET
            Auth:
              Authorizer: NONE
    Metadata:
      SamResourceId: ConfigFunction
Outputs:
  ApiUrl:
    Value:
      Fn::Sub: https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
  BucketName:
    Value:
      Ref: FormsBucket
  TableName:
    Value:
      Ref: FormsTable
  LocalhostClientId:
    Value:
      Ref: LocalhostClient
  ProductionClientId:
    Value:
      Ref: ProductionClient
