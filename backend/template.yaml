AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: TGV Mitglieder Backend

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME: !Ref FormsTable
        BUCKET_NAME: !Ref FormsBucket

Resources:
  FormsBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [PUT]
            AllowedOrigins: ['*']
            MaxAge: 3600

  FormsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FormsBucket
      PolicyDocument:
        Statement:
          - Sid: DenyAllExceptPresigned
            Effect: Deny
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub '${FormsBucket.Arn}/*'
            Condition:
              StringNotEquals:
                aws:PrincipalArn: !GetAtt GetUploadUrlFunctionRole.Arn

  FormsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins: ['*']
        AllowHeaders: ['*']
        AllowMethods: ['GET', 'POST', 'OPTIONS']

  GetUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get-upload-url.handler
      CodeUri: src/
      Policies:
        - Statement:
            - Effect: Allow
              Action: 's3:PutObject'
              Resource: !Sub '${FormsBucket.Arn}/*'
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /upload-url
            Method: GET

  SubmitFormFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: submit-form.handler
      CodeUri: src/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FormsTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref Api
            Path: /submit
            Method: POST

Outputs:
  ApiUrl:
    Value: !Sub "https://${Api}.execute-api.${AWS::Region}.amazonaws.com"
  BucketName:
    Value: !Ref FormsBucket
  TableName:
    Value: !Ref FormsTable
